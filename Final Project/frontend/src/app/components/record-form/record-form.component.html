<div class="bg-white shadow rounded-lg p-4">
  <h2 class="text-xl font-semibold text-gray-800 mb-4">
    {{
      editRecord
        ? "Edit Record (v" + editRecord.version + ")"
        : "Create New Record"
    }}
  </h2>

  <form [formGroup]="recordForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700">Title</label>
      <input
        type="text"
        formControlName="title"
        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border"
        [ngClass]="{
          'border-red-300':
            recordForm.get('title')?.invalid &&
            recordForm.get('title')?.touched,
        }"
      />
      <div
        *ngIf="
          recordForm.get('title')?.invalid && recordForm.get('title')?.touched
        "
        class="text-red-500 text-xs mt-1"
      >
        Title is required (min 3 chars).
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Content</label>
      <textarea
        formControlName="content"
        rows="4"
        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border"
        [ngClass]="{
          'border-red-300':
            recordForm.get('content')?.invalid &&
            recordForm.get('content')?.touched,
        }"
      ></textarea>
      <div
        *ngIf="
          recordForm.get('content')?.invalid &&
          recordForm.get('content')?.touched
        "
        class="text-red-500 text-xs mt-1"
      >
        Content is required.
      </div>
    </div>

    <div class="flex justify-end gap-2 pt-2">
      <button
        type="button"
        (click)="onCancel()"
        class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none"
      >
        Cancel
      </button>
      <button
        type="submit"
        [disabled]="recordForm.invalid || isSubmitting"
        class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50"
      >
        {{ isSubmitting ? "Saving..." : "Save" }}
      </button>
    </div>
  </form>
</div>
