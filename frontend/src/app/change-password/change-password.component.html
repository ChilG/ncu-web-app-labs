<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="card shadow border-0 rounded-3">
        <div
          class="card-header bg-dark text-white text-center py-3 rounded-top-3"
        >
          <h4 class="mb-0">
            <i class="bi bi-shield-lock me-2"></i> Change Password
          </h4>
        </div>
        <div class="card-body p-4">
          <div
            *ngIf="successMessage"
            class="alert alert-success alert-dismissible fade show"
            role="alert"
          >
            {{ successMessage }}
            <button
              type="button"
              class="btn-close"
              (click)="successMessage = ''"
              aria-label="Close"
            ></button>
          </div>

          <div
            *ngIf="errorMessage"
            class="alert alert-danger alert-dismissible fade show"
            role="alert"
          >
            {{ errorMessage }}
            <button
              type="button"
              class="btn-close"
              (click)="errorMessage = ''"
              aria-label="Close"
            ></button>
          </div>

          <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="oldPassword" class="form-label"
                >Current Password</label
              >
              <input
                type="password"
                class="form-control"
                id="oldPassword"
                formControlName="oldPassword"
                [class.is-invalid]="
                  passwordForm.get('oldPassword')?.invalid &&
                  passwordForm.get('oldPassword')?.touched
                "
              />
              <div
                class="invalid-feedback"
                *ngIf="passwordForm.get('oldPassword')?.errors?.['required']"
              >
                Current password is required.
              </div>
            </div>

            <div class="mb-3">
              <label for="newPassword" class="form-label">New Password</label>
              <input
                type="password"
                class="form-control"
                id="newPassword"
                formControlName="newPassword"
                [class.is-invalid]="
                  passwordForm.get('newPassword')?.invalid &&
                  passwordForm.get('newPassword')?.touched
                "
              />
              <div
                class="invalid-feedback"
                *ngIf="passwordForm.get('newPassword')?.errors?.['required']"
              >
                New password is required.
              </div>
              <div
                class="invalid-feedback"
                *ngIf="passwordForm.get('newPassword')?.errors?.['minlength']"
              >
                New password must be at least 6 characters long.
              </div>
            </div>

            <div class="mb-4">
              <label for="confirmPassword" class="form-label"
                >Confirm New Password</label
              >
              <input
                type="password"
                class="form-control"
                id="confirmPassword"
                formControlName="confirmPassword"
                [class.is-invalid]="
                  passwordForm.get('confirmPassword')?.invalid &&
                  passwordForm.get('confirmPassword')?.touched
                "
              />
              <div
                class="invalid-feedback"
                *ngIf="
                  passwordForm.get('confirmPassword')?.errors?.['required']
                "
              >
                Please confirm your new password.
              </div>
              <div
                class="invalid-feedback"
                *ngIf="
                  passwordForm.errors?.['passwordMismatch'] &&
                  passwordForm.get('confirmPassword')?.touched
                "
              >
                Passwords do not match.
              </div>
            </div>

            <div class="d-grid mt-4">
              <button
                type="submit"
                class="btn btn-primary btn-lg"
                [disabled]="isLoading"
              >
                <span
                  *ngIf="isLoading"
                  class="spinner-border spinner-border-sm me-2"
                  role="status"
                  aria-hidden="true"
                ></span>
                {{ isLoading ? "Updating..." : "Update Password" }}
              </button>
            </div>
            <div class="text-center mt-3">
              <a routerLink="/teacher" class="text-decoration-none">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
