<div class="bg-white shadow rounded-lg p-4">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-semibold text-gray-800">Active Records</h2>
    <button
      class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow-sm text-sm"
      (click)="loadRecords()"
    >
      Refresh
    </button>
  </div>

  <div *ngIf="records.length === 0" class="text-gray-500 text-center py-6">
    No active records found. Create one to get started!
  </div>

  <ul class="divide-y divide-gray-200">
    <li
      *ngFor="let record of records"
      class="py-4 flex justify-between items-center hover:bg-gray-50 px-2 rounded transition-colors"
    >
      <div>
        <h3 class="text-sm font-medium text-gray-900">
          {{ record.title }}
          <span
            class="text-xs text-blue-500 ml-2 shadow-sm border border-blue-200 bg-blue-50 rounded-full px-2 py-0.5"
            >v{{ record.version }}</span
          >
        </h3>
        <p class="text-sm text-gray-500 mt-1 line-clamp-2">
          {{ record.content }}
        </p>
        <div class="text-xs text-gray-400 mt-2">ID: {{ record.record_id }}</div>
      </div>
      <div class="flex gap-2 text-sm ml-4">
        <!-- These would ideally emit events to a parent to show form/history -->
        <button
          class="text-indigo-600 hover:text-indigo-900 font-medium"
          (click)="editRecord.emit(record)"
        >
          Edit
        </button>
        <button
          class="text-emerald-600 hover:text-emerald-900 font-medium"
          (click)="viewHistory.emit(record.record_id)"
        >
          History
        </button>
        <button
          class="text-red-600 hover:text-red-900 font-medium"
          (click)="deleteRecord(record.record_id)"
        >
          Delete
        </button>
      </div>
    </li>
  </ul>
</div>
